openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Reel Studio API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: reels
    description: Reel management
  - name: templates
    description: Reel templates
  - name: schedules
    description: Scheduled posts
  - name: quotes
    description: Quote generation
  - name: stats
    description: Dashboard statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /reels:
    get:
      operationId: listReels
      tags: [reels]
      summary: List all reels
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of reels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reel"
    post:
      operationId: createReel
      tags: [reels]
      summary: Create a new reel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReelInput"
      responses:
        "201":
          description: Created reel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reel"

  /reels/{id}:
    get:
      operationId: getReel
      tags: [reels]
      summary: Get a reel by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reel"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateReel
      tags: [reels]
      summary: Update a reel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReelUpdate"
      responses:
        "200":
          description: Updated reel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reel"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteReel
      tags: [reels]
      summary: Delete a reel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /reels/{id}/favorite:
    patch:
      operationId: toggleReelFavorite
      tags: [reels]
      summary: Toggle favorite status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated reel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reel"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List all reel templates
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"

  /schedules:
    get:
      operationId: listSchedules
      tags: [schedules]
      summary: List all scheduled posts
      responses:
        "200":
          description: List of scheduled posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Schedule"
    post:
      operationId: createSchedule
      tags: [schedules]
      summary: Schedule a reel for posting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInput"
      responses:
        "201":
          description: Created schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"

  /schedules/{id}:
    delete:
      operationId: deleteSchedule
      tags: [schedules]
      summary: Cancel a scheduled post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cancelled

  /quotes/generate:
    post:
      operationId: generateQuote
      tags: [quotes]
      summary: Generate a quote by category/mood
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRequest"
      responses:
        "200":
          description: Generated quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedQuote"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /reels/recent:
    get:
      operationId: getRecentReels
      tags: [reels]
      summary: Get recently created reels
      responses:
        "200":
          description: Recent reels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reel"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Reel:
      type: object
      required: [id, quote, category, templateId, status, isFavorite, createdAt]
      properties:
        id:
          type: integer
        quote:
          type: string
        author:
          type: ["string", "null"]
        category:
          type: string
        templateId:
          type: string
        status:
          type: string
          enum: [draft, posted, scheduled]
        isFavorite:
          type: boolean
        captionText:
          type: ["string", "null"]
        hashtags:
          type: ["string", "null"]
        platforms:
          type: ["string", "null"]
        createdAt:
          type: string

    ReelInput:
      type: object
      required: [quote, category, templateId]
      properties:
        quote:
          type: string
        author:
          type: string
        category:
          type: string
        templateId:
          type: string
        status:
          type: string
          enum: [draft, posted, scheduled]
        captionText:
          type: string
        hashtags:
          type: string
        platforms:
          type: string

    ReelUpdate:
      type: object
      properties:
        quote:
          type: string
        author:
          type: string
        category:
          type: string
        templateId:
          type: string
        status:
          type: string
          enum: [draft, posted, scheduled]
        captionText:
          type: string
        hashtags:
          type: string
        platforms:
          type: string

    Template:
      type: object
      required: [id, name, description, bgColor, textColor, fontStyle, accentColor]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        bgColor:
          type: string
        textColor:
          type: string
        accentColor:
          type: string
        fontStyle:
          type: string

    Schedule:
      type: object
      required: [id, reelId, platform, scheduledAt, status, createdAt]
      properties:
        id:
          type: integer
        reelId:
          type: integer
        platform:
          type: string
        scheduledAt:
          type: string
        status:
          type: string
          enum: [pending, posted, failed, cancelled]
        createdAt:
          type: string
        reel:
          $ref: "#/components/schemas/Reel"

    ScheduleInput:
      type: object
      required: [reelId, platform, scheduledAt]
      properties:
        reelId:
          type: integer
        platform:
          type: string
        scheduledAt:
          type: string

    QuoteRequest:
      type: object
      required: [category]
      properties:
        category:
          type: string
        mood:
          type: string
        customPrompt:
          type: string

    GeneratedQuote:
      type: object
      required: [quote, author, category]
      properties:
        quote:
          type: string
        author:
          type: string
        category:
          type: string
        suggestedHashtags:
          type: string

    Stats:
      type: object
      required: [totalReels, scheduledPosts, postedReels, draftReels, favoriteReels, topCategory]
      properties:
        totalReels:
          type: integer
        scheduledPosts:
          type: integer
        postedReels:
          type: integer
        draftReels:
          type: integer
        favoriteReels:
          type: integer
        topCategory:
          type: ["string", "null"]
