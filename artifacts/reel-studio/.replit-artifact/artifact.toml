kind = "web"
previewPath = "/"
title = "Reel Studio"
version = "1.0.0"
id = "artifacts/reel-studio"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21533

[services.development]
run = "pnpm --filter @workspace/reel-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reel-studio", "run", "build" ]
serve = "static"
publicDir = "artifacts/reel-studio/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21533"
BASE_PATH = "/"
